{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="page-container">
        <div class="top-bar">
            <h1>Login</h1>
        </div>

        <div class="form-card">
            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label>Username</label>
                    {{ form.username }}
                </div>

                <div class="form-group">
                    <label>Password</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="submit-btn">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
